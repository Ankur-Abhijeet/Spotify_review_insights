services:
  - type: web
    name: spotify-review-insights-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: true # This forces Render to prompt you for the key during setup
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: 3.10.0
